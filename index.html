<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Curvature & Visibility Calculator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>

<div id="map-container">
  <div id="view-tabs">
    <button class="view-tab active" data-tab="map">Map</button>
    <button class="view-tab" data-tab="3d">3D View</button>
    <span class="view-tab-sep"></span>
    <button class="view-tab" id="satellite-btn">
      <span class="sat-label">Sat</span>
      <span class="sat-spinner" id="sat-spinner"></span>
      <span class="sat-track"><span class="sat-thumb"></span></span>
    </button>
  </div>
  <div class="map-hint" id="map-hint">Click map to place Observer</div>
  <div id="map"></div>
  <div id="view3d-container">
    <canvas id="view3d-canvas"></canvas>
    <div id="view3d-overlay"></div>
    <div id="view3d-sat-pulse"></div>
    <div id="view3d-fabs">
      <button id="v3d-daynight" class="v3d-fab" title="Switch to day">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-scroll">
    <div id="sidebar-empty">Place an Observer on the map, then click to add Targets</div>
    <div id="target-cards"></div>
  </div>
  <div id="sidebar-add">
    <button class="add-target-btn" id="btn-add-target">+ Add target (click map)</button>
  </div>
</div>

<div id="diagram-container">
  <canvas id="diagram-canvas"></canvas>
</div>

<div id="controls">
  <div class="ctrl-section">
    <div class="ctrl-section-title">Observer</div>
    <div class="ctrl-row">
      <div style="width:9px;height:9px;border-radius:50%;background:#60a5fa;flex-shrink:0"></div>
      <span class="ctrl-label">Eye height</span>
      <input class="obs-elev-input" id="obs-elev" type="number" value="2" min="0" max="9000" step="0.5">
      <span style="font-size:10px;color:#475569">m</span>
    </div>
  </div>
  <div class="ctrl-section">
    <div class="ctrl-section-title">Terrain (DK only)</div>
    <div class="ctrl-row">
      <span class="ctrl-label">Resolution</span>
      <select class="refraction-select" id="terrain-res">
        <option value="0">Off</option>
        <option value="256">Low</option>
        <option value="1024">High</option>
      </select>
      <span id="terrain-status" style="font-size:10px;color:#475569;margin-left:4px"></span>
    </div>
  </div>
  <div class="ctrl-section">
    <div class="ctrl-section-title">Atmosphere</div>
    <div class="ctrl-row">
      <span class="ctrl-label">Refraction</span>
      <select class="refraction-select" id="refraction-preset">
        <option value="0">None (k = 0)</option>
        <option value="0.13" selected>Standard (k = 0.13)</option>
        <option value="0.20">Warm / humid (k = 0.20)</option>
        <option value="0.25">Superior mirage (k = 0.25)</option>
        <option value="0.07">Cold water / arctic (k = 0.07)</option>
      </select>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<script src="app.js"></script>
<script type="module" src="view3d.js"></script>
</body>
</html>
